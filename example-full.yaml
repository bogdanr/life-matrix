# Life Matrix - Full Example (v2.0)
# Complete configuration with all options, Home Assistant integration,
# physical UI (2 rotary encoders + buttons), and status LEDs.
# Tested on Adafruit Matrix Portal S3 with 2x 64x32 HUB75 panels (rotated 90°).
#
# For a minimal setup see example-minimal.yaml.
# monobit.ttf is included in the repository — copy it to your ESPHome config dir.

substitutions:
  devicename: life-matrix
  # Display settings
  default_brightness: "20"
  default_style: "Single Color"
  default_text_area: "Top"
  # Schedule (24-hour format)
  bed_time: "22"
  work_start: "9"
  work_end: "17"
  # Lifespan biographical data (example defaults)
  my_birthday: "1990-01-01"
  kids_birthdays: ""
  parents_birthdays: ""
  siblings_birthdays: ""
  milestones: ""
  living_with_partner: ""
  marriage: ""
  moved_out_age: "18"
  school_years: "12"
  retirement_age: "65"
  life_expectancy: "90"
  # Year events and exercise list
  year_events: ""
  exercise_list: "push-ups,squats,stretch,walk"

esphome:
  name: ${devicename}
  on_boot:
    - priority: 600
      then:
        - light.turn_on:
            id: status_led
            effect: none
            red: 0%
            green: 100%
            blue: 0%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

external_components:
  - source: github://bogdanr/life-matrix
    components: [ life_matrix ]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  logs:
    lm_nvs: DEBUG
    life_matrix: DEBUG

api:
ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: America/New_York

font:
  - file: "monobit.ttf"
    id: font_sm
    size: 16
    glyphs: >-
      !"%()+*=,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz@

debug:
  update_interval: 5s

# Hardware sensors and controls
sensor:
  - platform: debug
    free:
      name: "Heap Free"
      icon: "mdi:memory"
      entity_category: diagnostic
    loop_time:
      name: "Loop Time"
      icon: "mdi:timer-cog"
      entity_category: diagnostic

  - platform: template
    name: "GoL Final Generation"
    id: gol_final_generation
    icon: "mdi:grid"
    accuracy_decimals: 0
    unit_of_measurement: "gen"
    state_class: measurement

  - platform: template
    name: "GoL Final Population"
    id: gol_final_population
    icon: "mdi:grid"
    accuracy_decimals: 0
    unit_of_measurement: "cells"
    state_class: measurement

  # Navigation Encoder (Enc1)
  - platform: rotary_encoder
    id: enc1
    pin_a:
      number: GPIO4
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO11
      mode: INPUT_PULLUP
    on_clockwise:
      - lambda: id(life_matrix_component)->enc1_clockwise();
    on_anticlockwise:
      - lambda: id(life_matrix_component)->enc1_anticlockwise();

  # Adjustment Encoder (Enc2)
  - platform: rotary_encoder
    id: enc2
    pin_a:
      number: GPIO5
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO18
      mode: INPUT_PULLUP
    on_clockwise:
      - lambda: id(life_matrix_component)->enc2_clockwise();
    on_anticlockwise:
      - lambda: id(life_matrix_component)->enc2_anticlockwise();

binary_sensor:
  - platform: gpio
    id: btn_mode
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: id(life_matrix_component)->toggle_settings_mode();
      - light.turn_on: red_led

  - platform: gpio
    id: btn_enc2
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: id(life_matrix_component)->enc2_press();
      - light.turn_on: red_led

  - platform: gpio
    id: btn_pause
    pin:
      number: GPIO6
      mode: INPUT_PULLUP
    on_press:
      - lambda: id(life_matrix_component)->toggle_pause();
      - light.turn_on: red_led

  - platform: gpio
    id: btn_down
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
    on_press:
      - lambda: id(life_matrix_component)->button_down_press();
      - light.turn_on: red_led

light:
  - platform: neopixelbus
    id: status_led
    name: "Status LED"
    type: GRB
    variant: WS2812x
    pin: GPIO8
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 0.5s
          update_interval: 0.5s

  - platform: monochromatic
    id: red_led
    name: "Red LED"
    output: red_led_output

output:
  - platform: gpio
    id: red_led_output
    pin: GPIO21

# HUB75 Display
display:
  - platform: hub75
    id: matrix_display
    board: adafruit-matrix-portal-s3
    panel_width: 64
    panel_height: 32
    layout_cols: 2
    layout: HORIZONTAL
    double_buffer: true
    update_interval: 50ms
    rotation: 90
    lambda: |-
      auto time = id(sntp_time).now();
      if (!time.is_valid()) {
        it.print(it.get_width() / 2, it.get_height() / 2, id(font_sm),
                 Color(255, 255, 255), display::TextAlign::CENTER, "Sync...");
        return;
      }
      id(life_matrix_component)->render(it, time);

# Life Matrix Component
# In v2.0, all HA entities are auto-generated. No manual switch/select/number/text definitions needed.
life_matrix:
  id: life_matrix_component
  display: matrix_display
  time_id: sntp_time
  status_led: status_led
  font_small: font_sm

  # Grid dimensions (after 90° rotation: 32w × 120h)
  grid_width: 32
  grid_height: 120
  screen_cycle_time: 5s

  # Screen visibility (defaults)
  screens:
    year: { enabled: true }
    month: { enabled: true }
    day: { enabled: true }
    hour: { enabled: true }
    habits: { enabled: false }
    lifespan: { enabled: true }
    conway: { enabled: true }
    pomodoro: { enabled: false }

  # Game of Life settings
  game_of_life:
    update_interval: 200ms
    complex_patterns: false
    auto_reset_on_stable: true
    stability_timeout: 60s
    demo_mode: false

  # Time segments (affects Day view coloring)
  time_segments:
    bed_time_hour: ${bed_time}
    work_start_hour: ${work_start}
    work_end_hour: ${work_end}

  # Lifespan configuration (biographical data)
  lifespan:
    birthday: "${my_birthday}"
    kids: "${kids_birthdays}"
    parents: "${parents_birthdays}"
    siblings: "${siblings_birthdays}"
    milestones: "${milestones}"
    partner_ranges: "${living_with_partner}"
    marriage_ranges: "${marriage}"
    moved_out: "${moved_out_age}"
    school_years: "${school_years}"
    retirement: "${retirement_age}"
    life_expectancy_age: "${life_expectancy}"

  # Year events and exercise list (compiled-in defaults; overridable via HA)
  year_events: "${year_events}"
  exercise_list: "${exercise_list}"

  # Visual styling
  style: "${default_style}"
  gradient_type: "Red-Blue"
  text_area_position: "${default_text_area}"
  fill_direction: "Bottom to Top"
  marker_style: "Single Dot"
  marker_color: "Blue"
  day_fill: "Shaded"
  year_event_style: "Markers"
  conway_speed: "Normal (200ms)"
  pomodoro_preset: "Classic (25/5)"

  # Optional: Game of Life sensors
  gol_final_generation_sensor: gol_final_generation
  gol_final_population_sensor: gol_final_population

  # Optional: Icons (downloaded at compile time)
  # icon_cache: true
  # icons:
  #   - icon_id: play
  #     lameid: "32866"
